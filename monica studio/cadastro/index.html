<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/img/logo.iconi.ico" type="image/x-icon">
    <title>CADASTRO - STUDIO MÔNICA CAMARGO</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="../assets/js/theme.js"></script>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="../assets/img/Studio Beauty Mônica Camargo.png" class="loader-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="meuAlerta" class="aviso-customizado"></div>
    <div class="background-animated"></div>

    <div class="auth-container">
        <h2>Cadastro</h2>
        <div class="auth-form">
            <label>Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label>WhatsApp (Apenas números)</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15">

            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">

            <label>Sua Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha">

            <button class="btn-confirm" id="btnCadastrar">Cadastrar</button>
        </div>
        <div class="auth-footer">
            Já possui conta? <a href="../login/index.html">Entrar</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
