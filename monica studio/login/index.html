<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/img/logo.iconi.ico" type="image/x-icon">
    <title>STUDIO BEAUTY MÔNICA CAMARGO</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="../assets/js/theme.js"></script>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="../assets/img/Studio Beauty Mônica Camargo.png" class="loader-logo-bg" alt="Logo">
            <div class="spinner"></div>
            <h1 class="loader-text">STUDIO BEAUTY</h1>
        </div>
    </div>

    <div class="background-animated"></div>

    <div class="login-container">
        <h2>LOGIN</h2>
        <form id="formLogin">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Seu e-mail aqui" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Sua senha" required>

            <button type="submit" id="btnEntrar">Entrar</button>
        </form>
        <p>Ainda não tem conta? <br> 
            <a href="../cadastro/index.html">Cadastre-se agora</a>
        </p>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
